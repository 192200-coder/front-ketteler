<main class="mobile-container">
  <header class="header-nav">
    <button class="btn-back" (click)="goBack()">
      <i class="fa-solid fa-chevron-left"></i> Atrás
    </button>
  </header>

  <h1 class="page-title">Historial de asistencia</h1>

  <section class="history-list">
    @for (ev of eventos(); track $index) {
      <div class="history-item">
        <div class="status-indicator">
          @if (ev.tipo === 'Intento fallido') {
            <i class="fa-solid fa-circle-xmark" style="color: #d93025; font-size: 1.8rem"></i>
          } @else {
            <i class="fa-solid fa-circle-check check-icon"></i>
          }
        </div>
        <div class="history-details">
          <span class="history-date">{{ ev.tipo }} — {{ ev.fecha }}</span>
          <span class="history-time">{{ ev.hora }}</span>
          @if (ev.motivo) {
            <span class="history-motivo" [title]="ev.motivo">{{ ev.motivo }}</span>
          }
        </div>
        @if (ev.esAnomalia) {
          <div
            class="status-badge"
            style="background: #fce8e6; color: #d93025; border-color: #f5c6cb"
          >
            Anomalía
          </div>
        }
      </div>
    } @empty {
      <p style="text-align: center; color: #999; padding: 2rem 0">Sin registros de asistencia.</p>
    }
  </section>

  <nav class="bottom-nav">
    <button class="nav-item active">
      <i class="fa-solid fa-star"></i>
      <span>Historial</span>
    </button>
    <button class="nav-item" (click)="navigateTo('home')">
      <i class="fa-solid fa-house"></i>
      <span>Inicio</span>
    </button>
    <button class="nav-item" (click)="navigateTo('documentos')">
      <i class="fa-regular fa-folder-open"></i>
      <span>Documentos</span>
    </button>
  </nav>
</main>
