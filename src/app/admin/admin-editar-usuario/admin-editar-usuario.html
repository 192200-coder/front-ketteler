<div class="admin-container">
  <div class="form-card">
    <h2>Editar usuario</h2>

    @if (mensaje()) {
      <p class="login-error">{{ mensaje() }}</p>
    }

    @if (cargando()) {
      <p>Cargando información del usuario...</p>
    } @else {

      <div class="form-group">
        <label>Nombres</label>
        <input type="text" class="custom-input" [(ngModel)]="firstName" name="firstName">
      </div>

      <div class="form-group">
        <label>Apellidos</label>
        <input type="text" class="custom-input" [(ngModel)]="surName" name="surName">
      </div>

      <div class="form-group">
        <label>Correo</label>
        <input type="email" class="custom-input" [(ngModel)]="email" name="email">
      </div>

      <div class="form-group">
        <label>Nueva contraseña (dejar en blanco para no cambiarla)</label>
        <input type="password" class="custom-input" [(ngModel)]="password" name="password">
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input type="number" class="custom-input" [(ngModel)]="cellPhoneNumber" name="cellPhoneNumber">
      </div>

      <div class="form-group">
        <label>Teléfono de emergencia</label>
        <input type="number" class="custom-input" [(ngModel)]="cellPhoneEmergency" name="cellPhoneEmergency">
      </div>

      <div class="form-group">
        <label>Estado</label>
        <button type="button" class="btn-secondary" (click)="toggleEstado()">
          {{ active ? 'Activo — clic para desactivar' : 'Inactivo — clic para activar' }}
        </button>
      </div>

      <div class="form-actions">
        <button class="btn-secondary" routerLink="/admin-gestion-usuarios">Cancelar</button>
        <button class="btn-primary" [disabled]="guardando()" (click)="guardarCambios()">
          {{ guardando() ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    }
  </div>
</div>
