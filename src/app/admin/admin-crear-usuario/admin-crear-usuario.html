<div class="admin-container">
  <div class="form-card">
    <h2>Crear nuevo usuario</h2>

    @if (mensaje()) {
      <p class="login-error">{{ mensaje() }}</p>
    }

    <div class="form-group">
      <label>Nombres</label>
      <input type="text" class="custom-input" [(ngModel)]="firstName" name="firstName">
    </div>

    <div class="form-group">
      <label>Apellidos</label>
      <input type="text" class="custom-input" [(ngModel)]="surName" name="surName">
    </div>

    <div class="form-group">
      <label>Correo (usuario de acceso)</label>
      <input type="email" class="custom-input" [(ngModel)]="email" name="email">
    </div>

    <div class="form-group">
      <label>Contraseña temporal</label>
      <input type="password" class="custom-input" [(ngModel)]="password" name="password">
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input type="number" class="custom-input" [(ngModel)]="cellPhoneNumber" name="cellPhoneNumber">
    </div>

    <div class="form-group">
      <label>Teléfono de emergencia</label>
      <input type="number" class="custom-input" [(ngModel)]="cellPhoneEmergency" name="cellPhoneEmergency">
    </div>

    <div class="form-actions">
      <button class="btn-secondary" routerLink="/admin-gestion-usuarios">Cancelar</button>
      <button class="btn-primary" [disabled]="guardando()" (click)="crearUsuario()">
        {{ guardando() ? 'Creando...' : 'Crear usuario' }}
      </button>
    </div>
  </div>
</div>
